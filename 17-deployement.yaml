apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    purpose: deployment-demo
    tier: frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      labels:
        project: roboshop
        purpose: deployment-demo
        tier: frontend
        component: frontend
  template:
    metadata:
      labels:
        project: roboshop
        purpose: deployment-demo
        tier: frontend
        component: frontend
    spec:
      components:
      - name: nginx
        image: nginx:stable-alpine3.23-perl